services:
  - type: web
    name: kj-bridgedeck-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r api/requirements.txt
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: BRAIN_API_URL
        value: https://jim-brain-production.up.railway.app
      - key: BRAIN_KEY
        sync: false
      - key: BRIDGEDECK_ADMIN_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WATCHER_HOST
        value: http://localhost:7171
      - key: PYTHON_VERSION
        value: 3.11.9
